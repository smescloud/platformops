apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eu001-namespaces
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: platform-infra
  source:
    repoURL: https://github.com/smescloud/platformops.git
    targetRevision: eu001-release1
    path: platform/infra/namespaces
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
