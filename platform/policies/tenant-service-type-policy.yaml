apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: tenant-service-type-policy
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["services"]
  validations:
    - expression: "!has(object.spec.type) || object.spec.type == 'ClusterIP'"
      message: "Tenant namespaces may only use ClusterIP services."
    - expression: "!has(object.spec.externalIPs)"
      message: "externalIPs are not allowed in tenant namespaces."
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: tenant-service-type-binding
spec:
  policyName: tenant-service-type-policy
  validationActions: [Deny]
  matchResources:
    namespaceSelector:
      matchLabels:
        smescloud.com/tenant: "true"