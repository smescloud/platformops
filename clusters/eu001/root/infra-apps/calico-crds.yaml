apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eu001-calico-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/smescloud/platformops.git
    targetRevision: main
    path: platform/infra/calico/crds
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true