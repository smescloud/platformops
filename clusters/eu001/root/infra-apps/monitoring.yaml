apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eu001-monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 73.2.0
      helm:
        releaseName: monitoring
        valueFiles:
          - $values/platform/infra/monitoring/values-base.yaml
          - $values/clusters/eu001/overlays/monitoring-values.yaml
    - repoURL: https://github.com/smescloud/platformops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true