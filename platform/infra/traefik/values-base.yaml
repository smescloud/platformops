deployment:
  enabled: false

daemonset:
  enabled: true

service:
  type: NodePort

ports:
  web:
    port: 80
    exposedPort: 80
    nodePort: 30080
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    port: 443
    exposedPort: 443
    nodePort: 30443

providers:
  kubernetesIngress:
    enabled: true
  kubernetesCRD:
    enabled: true

ingressClass:
  enabled: true
  isDefaultClass: true
  name: traefik

logs:
  general:
    level: INFO
  access:
    enabled: true

api:
  dashboard: true

additionalArguments:
  - "--providers.kubernetesingress.ingressclass=traefik"

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: smescloud.com/ingress
              operator: In
              values: ["true"]

tolerations: 
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
