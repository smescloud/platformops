prometheusOperator:
  admissionWebhooks:
    enabled: true
    failurePolicy: Ignore
    patch:
      enabled: false
    certManager:
      enabled: true

grafana:
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password

  service:
    type: ClusterIP

  ingress:
    enabled: false