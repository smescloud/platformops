apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eu001-argocd-access
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/smescloud/platformops.git
    targetRevision: main
    path: clusters/eu001/apps/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true