apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextnodepostgres-bootstrap
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: nextnodepostgres
  source:
    repoURL: https://github.com/smescloud/platformops.git
    targetRevision: eu001-release1
    path: clusters/eu001/root/tenants/nextnodepostgres/bundle
  destination:
    server: https://kubernetes.default.svc
    namespace: nextnodepostgres
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true