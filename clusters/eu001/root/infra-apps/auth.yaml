apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eu001-auth
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: platform-infra
  source:
    repoURL: https://github.com/smescloud/platformops.git
    targetRevision: eu001-release1
    path: clusters/eu001/apps/auth
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
