apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik
  namespace: traefik-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: traefik
  namespace: traefik-system
  labels:
    app.kubernetes.io/name: traefik
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: traefik
  template:
    metadata:
      labels:
        app.kubernetes.io/name: traefik
    spec:
      serviceAccountName: traefik
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: smescloud.com/ingress
                    operator: In
                    values: ["true"]
      containers:
        - name: traefik
          image: traefik:v3.5.3
          args:
            - "--entryPoints.web.address=:80"
            - "--entryPoints.websecure.address=:443"
            - "--providers.kubernetesingress=true"
            - "--providers.kubernetesingress.ingressclass=traefik"
            - "--providers.kubernetescrd=true"
            - "--providers.kubernetescrd.allowcrossnamespace=true"
            - "--api.dashboard=true"
            - "--log.level=INFO"
            - "--accesslog=true"
            - "--entryPoints.web.http.redirections.entryPoint.to=websecure"
            - "--entryPoints.web.http.redirections.entryPoint.scheme=https"
          ports:
            - name: web
              hostPort: 80
              containerPort: 80
              protocol: TCP
            - name: websecure
              hostPort: 443
              containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          hostPath:
            path: /mnt/longhorn-storage/traefik-data
            type: DirectoryOrCreate