apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eu001-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/smescloud/platformops.git
    targetRevision: eu001-release1
    path: clusters/eu001/root
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
